<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded Background giving an app icon feel -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="#f8fafc" />
  
  <!-- Top Left: Addition (Red block) -->
  <rect x="10" y="10" width="35" height="35" rx="8" fill="#ef4444" />
  <path d="M27.5 17.5 v20 M17.5 27.5 h20" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

  <!-- Top Right: Subtraction (Blue block) -->
  <rect x="55" y="10" width="35" height="35" rx="8" fill="#3b82f6" />
  <path d="M62.5 27.5 h20" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

  <!-- Bottom Left: Multiplication (Green block) -->
  <rect x="10" y="55" width="35" height="35" rx="8" fill="#10b981" />
  <path d="M19 64 l17 17 M19 81 l17 -17" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

  <!-- Bottom Right: Division (Orange block) -->
  <rect x="55" y="55" width="35" height="35" rx="8" fill="#f59e0b" />
  <path d="M62.5 72.5 h20" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <circle cx="72.5" cy="62.5" r="3.5" fill="#ffffff" />
  <circle cx="72.5" cy="82.5" r="3.5" fill="#ffffff" />
</svg>